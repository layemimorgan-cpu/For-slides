<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worthly Slides</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --pink: #E91E8C; --pink-light: #F48CB6;
  --purple: #7B5EA7; --purple-deep: #4B3FD8;
  --dark: #1a1a2e; --mid: #4a4a6a;
}
body {
  background: #ede8f5; font-family: 'DM Sans', sans-serif;
  display: flex; flex-direction: column; align-items: center; gap: 60px; padding: 60px 24px;
}
.label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: #999; margin-bottom: 10px; text-align: center;
}
.slide {
  width: 540px; height: 720px; overflow: hidden; position: relative;
  background: linear-gradient(150deg, #fce8f6 0%, #ede4fd 45%, #dde4fd 100%);
  box-shadow: 0 24px 60px rgba(75,63,216,0.2), 0 4px 16px rgba(0,0,0,0.08);
}
.blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.5; }
.b1 { width: 360px; height: 360px; background: #e8b4f8; top: -100px; right: -80px; }
.b2 { width: 220px; height: 220px; background: #b4c8f8; bottom: 40px; left: -60px; }
.b3 { width: 140px; height: 140px; background: #f8b4d8; top: 280px; left: 80px; }

/* ===== SLIDE 1 — WISHLIST ===== */
.s1 .content {
position: relative; z-index: 3; padding: 28px 44px 0; text-align: center;
}
.s1 .tab-label {
font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
color: var(–purple); background: rgba(255,255,255,0.75); backdrop-filter: blur(8px);
border: 1px solid rgba(255,255,255,0.9); border-radius: 100px;
padding: 6px 14px; width: fit-content; margin: 0 auto 14px;
display: block; white-space: nowrap;
}
.s1 .headline {
font-family: ‘Playfair Display’, serif; font-size: 22px; font-weight: 900;
line-height: 1.15; color: var(–dark); white-space: nowrap;
}
.s1 .headline em {
font-style: italic;
background: linear-gradient(135deg, var(–pink), var(–purple-deep));
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.s1 .phone-wrap {
position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
width: 278px; z-index: 2;
}
.s1 .phone-wrap img {
width: 100%; border-radius: 36px;
border: 3px solid rgba(255,255,255,0.7);
box-shadow: 0 16px 48px rgba(75,63,216,0.2);
}

/* ===== SLIDE 2 — COMING SOON ===== */
.s2 .content {
position: relative; z-index: 2; height: 100%;
display: flex; flex-direction: column; align-items: center;
justify-content: center; padding: 52px 44px; text-align: center;
}
.s2 .icon { font-size: 52px; margin-bottom: 24px; }
.s2 .headline {
font-family: ‘Playfair Display’, serif; font-size: 46px; font-weight: 900;
line-height: 1.05; color: var(–dark); margin-bottom: 20px;
}
.s2 .headline em {
font-style: italic;
background: linear-gradient(135deg, var(–pink), var(–purple-deep));
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.s2 .sub {
font-size: 15px; color: var(–mid); line-height: 1.7;
margin-bottom: 36px; max-width: 340px;
}
.s2 .sub strong { color: var(–dark); font-weight: 700; }
.s2 .pill {
background: linear-gradient(135deg, var(–pink), var(–purple-deep));
border-radius: 100px; padding: 14px 32px;
font-size: 15px; font-weight: 700; color: white;
box-shadow: 0 8px 24px rgba(233,30,140,0.3);
}
.s2 .wm {
position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
font-family: ‘Playfair Display’, serif; font-size: 16px;
font-weight: 700; color: var(–purple); opacity: 0.45; white-space: nowrap; z-index: 3;
}
</style>

</head>
